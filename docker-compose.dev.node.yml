version: "3.9"

services:
  node:
    depends_on:
      - redis
      - rabbitmq
      - mysql
    image: node:20.13-alpine
    working_dir: /app
    volumes:
      - ./:/app
    ports:
      - "3001:3001"
      - "3002:3002"
    command: ["yarn", "tsx", "watch", "--clear-screen=false", "src/index.ts"]
